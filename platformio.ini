; FSAE Corner Weight - ESP32 BLE Scanner
; Board: Arduino Nano ESP32 (ESP32-S3)

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino

monitor_speed = 115200
upload_speed = 921600
; upload_port/monitor_port: auto-detected (works on both Windows COMx and RPi /dev/ttyACM0)

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    h2zero/NimBLE-Arduino@^2.2.1
    bblanchon/ArduinoJson@^7.2.0
